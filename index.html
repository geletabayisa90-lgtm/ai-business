<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>🚀 AI Business Dashboard</h1>

    <p>Welcome! This dashboard is where you'll build your AI business from idea to income.</p>

    <div class="dashboard">
        <div class="card">
            <h2>📊 Dashboard</h2>
            <p>Track your progress and business goals.</p>
        </div>

        <div class="card">
            <h2>🤖 AI Tools</h2>
            <p>Manage the AI tools used in your business.</p>
        </div>

        <div class="card">
            <h2>💰 Revenue</h2>
            <p>Track income and business growth.</p>
        </div>

        <div class="card">
            <h2>✅ Today's Tasks</h2>

            <input
                type="text"
                id="taskInput"
                placeholder="Enter today's task..."
            >

            <button id="addTask">Add Task</button>

            <ul id="taskList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
